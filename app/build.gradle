dependencies {
    // --- Core & lifecycle ---
    implementation libs.androidx.core.ktx
    implementation libs.androidx.lifecycle.runtime.ktx
    implementation libs.androidx.lifecycle.runtime.compose
    implementation libs.androidx.lifecycle.viewmodel.compose
    implementation libs.androidx.activity.compose

    // --- Navigation ---
    implementation libs.androidx.navigation.compose

    // --- Navigation 3 (1.1.0, stable) ---
    // This project is Nav3-only. Nav2 (androidx.navigation:navigation-compose)
    // has been fully removed.
    implementation libs.androidx.navigation3.runtime
    implementation libs.androidx.navigation3.ui
    implementation libs.androidx.lifecycle.viewmodel.navigation3
    // Adaptive layouts (list-detail etc.) for tablets and foldables
    implementation libs.androidx.compose.material3.adaptive.navigation3
    implementation(libs.kotlinx.serialization.core)

    // --- Paging ---
    implementation libs.androidx.paging.common.ktx
    implementation libs.androidx.paging.runtime.ktx
    implementation libs.androidx.paging.compose

    // --- Security / Browser / Splashscreen / Tracing / Profile installer ---
    implementation libs.androidx.security.crypto.ktx
    implementation libs.androidx.browser
    implementation libs.androidx.core.splashscreen
    implementation libs.androidx.tracing
    implementation libs.androidx.tracing.ktx
    implementation libs.androidx.profileinstaller
    implementation libs.androidx.compose.material3.adaptive.navigation3
    implementation libs.androidx.compose.animation
    implementation libs.androidx.compose.material.core

    // --- Compose (BOM-managed) ---
    def composeBom = platform(libs.androidx.compose.bom)
    implementation composeBom
    androidTestImplementation composeBom

    implementation libs.androidx.compose.ui
    implementation libs.androidx.compose.ui.tooling.preview
    implementation libs.androidx.compose.foundation
    implementation libs.androidx.compose.material
    implementation libs.androidx.compose.material.icons.core
    implementation libs.androidx.compose.material.icons.extended
    implementation libs.androidx.compose.material3
    implementation libs.androidx.compose.material3.window.size

    debugImplementation libs.androidx.compose.ui.tooling
    debugImplementation libs.androidx.compose.ui.test.manifest
    androidTestImplementation libs.androidx.compose.ui.test.junit4

    // --- Hilt (KSP-based, no kapt) ---
    implementation libs.hilt.android
    ksp          libs.hilt.compiler
    implementation libs.androidx.hilt.navigation.compose
    ksp          libs.androidx.hilt.compiler

    // --- Kotlinx serialization ---
    implementation libs.kotlinx.serialization.json

    // --- Accompanist ---
    implementation libs.accompanist.placeholder.material
    implementation libs.accompanist.webview
    implementation libs.accompanist.navigation.animation
    implementation libs.accompanist.systemuicontroller
    implementation libs.accompanist.permissions

    // --- Firebase ---
    implementation platform(libs.firebase.bom)
    implementation libs.firebase.analytics.ktx
    implementation libs.play.services.measurement.api

    // --- Networking ---
    implementation libs.retrofit
    implementation libs.retrofit.converter.gson
    implementation platform(libs.okhttp.bom)
    implementation libs.okhttp
    implementation libs.okhttp.logging.interceptor
    implementation libs.okio

    // --- Debugging (Stetho) ---
    implementation libs.stetho
    implementation libs.stetho.okhttp3

    // --- Cookies / Logging ---
    implementation libs.persistent.cookie.jar
    implementation libs.logger
    implementation libs.timber

    // --- Images / Animation ---
    implementation libs.coil.compose
    implementation libs.coil.svg
    implementation libs.lottie.compose

    // --- Java 8+ API desugaring ---
    coreLibraryDesugaring libs.desugar.jdk.libs

    // --- Tests ---
    testImplementation        libs.junit
    androidTestImplementation libs.androidx.test.ext.junit
    androidTestImplementation libs.androidx.test.espresso.core
}

// KSP config: Hilt 성능 개선
ksp {
    arg("dagger.hilt.android.internal.disableAndroidSuperclassValidation", "true")
}