import org.jetbrains.kotlin.gradle.dsl.JvmTarget

plugins {
    alias(libs.plugins.android.application)
    alias(libs.plugins.kotlin.android)
    alias(libs.plugins.kotlin.compose)        // REQUIRED for Kotlin 2.0+
    alias(libs.plugins.kotlin.parcelize)
    alias(libs.plugins.kotlin.serialization)
    alias(libs.plugins.ksp)                   // Replaces kapt (약 2배 빠름)
    alias(libs.plugins.hilt.android)
    alias(libs.plugins.google.services)
}

android {
    namespace 'com.goforer.phogal'
    // AGP 8.7.3은 최대 API 35까지 지원합니다. API 36은 AGP 8.11+ 필요.
    compileSdk = 36  // 기존 'compileSdk 36'에서 '=' 추가

    defaultConfig {
        targetSdk = 36
    }

    defaultConfig {
        applicationId "com.goforer.phogal"
        minSdk 28
        //noinspection OldTargetApi
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    buildTypes {
        debug {
            jniDebuggable true
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            enableUnitTestCoverage true
            enableAndroidTestCoverage true
        }
        release {
            ndk {
                debugSymbolLevel 'FULL'
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    lint {
        checkReleaseBuilds false
        checkDependencies true
        abortOnError false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    // Kotlin 2.0.21: kotlin { ... } DSL 사용
    kotlin {
        jvmToolchain(17)
        compilerOptions {
            jvmTarget = JvmTarget.JVM_17
            // Kotlin 2.0 새 기능 활용
            freeCompilerArgs.addAll(
                    "-Xcontext-receivers",
                    "-opt-in=kotlin.RequiresOptIn"
            )
        }
    }

    buildFeatures {
        compose true
        buildConfig true
    }

    // NOTE:
    //   Kotlin 2.0.21 + Compose Compiler plugin 조합에서는
    //   composeOptions 블록이 더 이상 필요 없습니다.
    //   Compose Compiler 버전은 Kotlin 버전과 자동 동기화됩니다.

    // AGP 8.7+: packagingOptions도 동작하지만 'packaging'이 표준 명칭
    packaging {
        resources {
            excludes += [
                    '/META-INF/{AL2.0,LGPL2.1}',
                    'META-INF/LICENSE*',
                    'META-INF/NOTICE*',
                    'META-INF/*.kotlin_module'
            ]
        }
    }

    sourceSets {
        String sharedTestDir = 'src/commonTest/kotlin'
        main {
            java.srcDirs += 'src/main/kotlin'
        }
        test {
            java.srcDirs += ['src/test/kotlin', sharedTestDir]
        }
        androidTest {
            java.srcDirs += ['src/androidTest/kotlin', sharedTestDir]
            resources.srcDirs += ['src/commonTest/resources']
        }
    }

    flavorDimensions += "default"

    productFlavors {
        prod {
            dimension "default"
            manifestPlaceholders = [appNameGradle: "Phogal", appLabel: "@string/app_name"]
            buildConfigField "String", "apiServer", "\" https://api.unsplash.com/\""
            buildConfigField "String", "clientId", "\"V9sYHDmwcPc46chEOLA_bhTV3hwsWG0P1ta1vNZjmLscR6sNPs\""
        }
        stg {
            dimension "default"
            applicationIdSuffix = ".stg"
            manifestPlaceholders = [appNameGradle: "Phogal_stg", appLabel: "Phogal_Stg"]
            buildConfigField "String", "apiServer", "\" https://api.unsplash.com/\""
            buildConfigField "String", "clientId", "\"V9sYHDmwcPc46chEOLA_bhTV3hwsWG0P1ta1vNZjmLs\""
        }
        dev {
            dimension "default"
            applicationIdSuffix = ".dev"
            manifestPlaceholders = [appNameGradle: "Phogal_Dev", appLabel: "Phogal_Dev"]
            buildConfigField "String", "apiServer", "\" https://api.unsplash.com/\""
            buildConfigField "String", "clientId", "\"V9sYHDmwcPc46chEOLA_bhTV3hwsWG0P1ta1vNZjmLs\""
        }
    }

    splits {
        abi {
            enable true
            reset()
            // 제거: armeabi, mips, mips64 (deprecated ABIs)
            include 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a'
            universalApk true
        }
    }
    kotlinOptions {
        freeCompilerArgs = ['-XXLanguage:+PropertyParamAnnotationDefaultTargetMode']
    }
}

// Compose Compiler 플러그인 옵션 (선택사항)
// 리포트/메트릭을 생성하고 싶다면 아래 주석을 해제하세요.
//composeCompiler {
//    reportsDestination = layout.buildDirectory.dir("compose_compiler")
//    metricsDestination = layout.buildDirectory.dir("compose_compiler")
