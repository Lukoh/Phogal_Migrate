# Project-wide Gradle settings.
# Optimized for:
#   - Android Studio Panda 2 (2025.3.2)
#   - Gradle 8.10.2
#   - AGP 8.7.3
#   - Kotlin 2.0.21
#
# IDE settings override this file; see Android Studio
# Settings -> Build, Execution, Deployment -> Build Tools -> Gradle.

# --- JVM settings ---
# Gradle 8.x + AGP 8.7: -Xmx4g is a safe default on machines with >= 8GB RAM.
# If you have 16GB+, increase to -Xmx6g for faster builds.
org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# --- Build performance ---
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.configureondemand=false

# Gradle Daemon JVM criteria (auto-provisioned by Foojay resolver)
# Panda 2 defaults to JDK 17 for AGP 8.x.

# --- AndroidX ---
android.useAndroidX=true

# --- Kotlin ---
kotlin.experimental.tryK2=false
kotlin.code.style=official
kotlin.incremental=true

# --- R-class & BuildConfig ---
android.nonTransitiveRClass=true
android.nonFinalResIds=true

# --- KSP ---
# KSP 2.0.21-1.0.28: use KSP2 (new stable processor).
ksp.useKSP2=true
ksp.useK2=true
android.defaults.buildfeatures.resvalues=true
android.sdk.defaultTargetSdkToCompileSdkIfUnset=false
android.enableAppCompileTimeRClass=false
android.usesSdkInManifest.disallowed=false
android.uniquePackageNames=false
android.dependency.useConstraints=true
android.r8.strictFullModeForKeepRules=false
android.r8.optimizedResourceShrinking=false
android.builtInKotlin=false
android.newDsl=false

# NOTE: android.enableJetifier is intentionally NOT set.
# Jetifier is only needed for legacy Support Library dependencies.
# This project fully uses AndroidX, so Jetifier is disabled for faster builds.

